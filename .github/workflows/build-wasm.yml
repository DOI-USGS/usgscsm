name: Build WASM

on:
  push:
    branches: [main, develop]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v13
      with:
        version: '3.1.58'

    - name: Build WASM
      run: |
        mkdir -p wasm
        cd wasm
        emcmake cmake .. -DCMAKE_BUILD_TYPE=Release -DUSGSCSM_WASM_OPTIMIZE=ON -DUSGSCSM_BUILD_TESTS=OFF -DUSGSCSM_BUILD_DOCS=OFF
        emmake make -j4

    - name: Test Core Functionality
      run: |
        npm test
        echo ""
        echo "=== Bundle Sizes ==="
        npm run size

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          wasm/dist/usgscsm.js
          wasm/dist/usgscsm.wasm
          wasm/dist/usgscsm.d.ts
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
