name: Publish wasm builds

on:
  release:
    types: [published]

permissions:
  contents: write  # Required to upload release assets
  id-token: write  # Required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # v22.14.0+ required for trusted publishing
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v13
        with:
          version: '3.1.58'

      - name: Build WASM
        run: |
          mkdir wasmbuild && cd wasmbuild
          emcmake cmake .. -DCMAKE_BUILD_TYPE=Release
          emmake make -j$(nproc)

      - name: Copy dist to package root for npm
        run: cp -r wasmbuild/dist ./dist

      - name: Set package version from git tag
        run: |
          # Remove refs/tags/ prefix first
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          # Remove optional 'v' prefix if present
          TAG_VERSION="${TAG_VERSION#v}"
          echo "Setting package.json version to: $TAG_VERSION"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version

      - name: Run tests
        run: npm test

      - name: Upload build artifacts to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            wasmbuild/dist/usgscsm.js
            wasmbuild/dist/usgscsm.wasm
            wasmbuild/dist/usgscsm.d.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # - name: Publish to NPM via OIDC
      #   run: npm publish --access public
